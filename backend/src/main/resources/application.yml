spring:
  application:
    name: restaurant-api

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/restaurant?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${DB_USER:restaurant}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # Never 'update' in production - Flyway manages schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-min-256-bits-and-use-environment-variable}
    expiration-minutes: 120

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3030,http://localhost:5173}

logging:
  level:
    com.restaurant.app: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
