spring:
  datasource:
    url: jdbc:h2:mem:restaurant_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=ORDER,USER,ROLE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        globally_quoted_identifiers: true
    open-in-view: false
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: false

app:
  jwt:
    secret: test-secret-must-be-at-least-256-bits-long-for-hs256-signing-algorithm
    expiration-minutes: 120

  cors:
    allowed-origins: "*"

logging:
  level:
    com.restaurant.app: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
